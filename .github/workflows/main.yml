name: EcoNav CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. Test & Lint ────────────────────────────────────────────────────────
  test-and-lint:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/backend.txt -r requirements/ml.txt
          pip install pytest ruff

      - name: Seed demo data
        run: python scripts/seed_data.py

      - name: Lint (Python)
        run: ruff check apps models scripts tests

      - name: Run tests
        run: python3 -m pytest

  # ─── 2. Docker Build Check ─────────────────────────────────────────────────
  docker-build:
    name: 🐋 Docker Build
    runs-on: ubuntu-latest
    needs: test-and-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f infra/docker/backend.Dockerfile -t econav-backend:ci .

      - name: Build frontend image
        run: docker build -f infra/docker/frontend.Dockerfile -t econav-frontend:ci .

  # ─── 3. Deploy to Vercel (only on push to main) ────────────────────────────
  deploy-vercel:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-and-lint, docker-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
